name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        precision: [float, double]
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libomp-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DHEAT_SOLVER_ENABLE_CUDA=OFF -DHEAT_SOLVER_PRECISION=${{ matrix.precision }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-cuda:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        precision: [float, double]
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.18
        id: cuda-toolkit

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libomp-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DHEAT_SOLVER_ENABLE_CUDA=ON -DHEAT_SOLVER_PRECISION=${{ matrix.precision }} -DCMAKE_CUDA_ARCHITECTURES=75

      - name: Build
        run: cmake --build build

      - name: List registered tests
        run: ctest --test-dir build -N

      - name: Check for CUDA-capable GPU
        id: cuda-gpu
        run: |
          if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test when a CUDA-capable GPU is available
        if: steps.cuda-gpu.outputs.available == 'true'
        run: ctest --test-dir build --output-on-failure
